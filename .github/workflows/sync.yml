name: Sync food data

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

concurrency:
  group: sync-food-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sync
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python scripts/sync.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/food.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Sync food data"

          # Remote may have moved (manual push or overlapping run). Rebase and retry.
          for attempt in 1 2 3; do
            if ! git pull --rebase origin main; then
              # food.json is fully generated — keep this run's version on conflict
              git checkout --theirs docs/food.json
              git add docs/food.json
              GIT_EDITOR=true git rebase --continue
            fi
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), retrying..."
            sleep 5
          done
          echo "Failed to push after retries"
          exit 1
